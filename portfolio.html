    <!-- JavaScript for Tab Switching -->
    <script>
        document.querySelectorAll('.mil-tab-nav li').forEach(tab => {
            tab.addEventListener('click', function () {
                // Remove active class from all tab navigation items
                document.querySelectorAll('.mil-tab-nav li').forEach(item => item.classList.remove('mil-active'));
                this.classList.add('mil-active');

                // Remove active class from all tab content items
                document.querySelectorAll('.mil-tab-item').forEach(item => item.classList.remove('mil-active'));
                // Get the target tab id from the data-tab attribute and add active class to it
                const target = this.getAttribute('data-tab');
                document.getElementById(target).classList.add('mil-active');
            });
        });
    </script>
